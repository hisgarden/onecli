name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/gateway -> target

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @onecli/db generate

      - name: Type check
        run: pnpm check:bun

      - name: Format check
        run: pnpm format:check

      - name: Unit tests (services)
        run: cd packages/services && bun test --coverage
        env:
          SECRET_ENCRYPTION_KEY: cSxLSnUovImyO3rblvXNj9kVakwVYTYBZVQTK3nJY0g=

      - name: Unit tests (API)
        run: cd apps/api && bun test

      - name: Build dashboard (Vite SPA)
        run: cd apps/dashboard && bun run build

      - name: SBOM crypto audit
        run: ./scripts/sbom-crypto-audit.sh

      - name: Lint migration names
        run: ./scripts/lint-migrations.sh

      # Checks that schema.prisma is fully covered by migrations.
      # Spins up a temporary Postgres only when Prisma files changed.
      - name: Check for Prisma changes
        id: prisma-changes
        run: |
          CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | grep -c '^packages/db/prisma/' || true)
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check migration drift
        if: steps.prisma-changes.outputs.changed != '0'
        run: |
          docker run -d --name shadow-db -e POSTGRES_USER=ci -e POSTGRES_PASSWORD=ci -e POSTGRES_DB=shadow -p 5433:5432 postgres:18-alpine
          until docker exec shadow-db pg_isready; do sleep 1; done
          pnpm --filter @onecli/db exec prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema-datamodel ./prisma/schema.prisma \
            --shadow-database-url postgresql://ci:ci@localhost:5433/shadow \
            --exit-code; EXIT_CODE=$?
          docker rm -f shadow-db
          exit $EXIT_CODE

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: ci
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: onecli_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://test:test@localhost:5433/onecli_test
      SECRET_ENCRYPTION_KEY: cSxLSnUovImyO3rblvXNj9kVakwVYTYBZVQTK3nJY0g=
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/gateway -> target

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @onecli/db generate

      - name: Run Prisma migrations
        run: pnpm --filter @onecli/db prisma migrate deploy

      - name: Gateway integration tests
        run: cd apps/gateway && cargo test -- --test-threads=1
