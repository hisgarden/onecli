# OneCLI — Bun-based deployment (Elysia API + React SPA + Rust gateway)
#
# Replaces Node.js + Next.js with Bun + Elysia. Smaller image, faster startup.
#
# Usage:
#   docker compose -f docker/docker-compose.bun.yml up -d
#
# Build:
#   docker build -f docker/Dockerfile.bun -t onecli-api .
#   docker build -f docker/Dockerfile.gateway -t onecli-gateway .

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onecli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onecli}
      POSTGRES_DB: ${POSTGRES_DB:-onecli}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onecli}"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - onecli

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bun
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "10254:10254"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-onecli}:${POSTGRES_PASSWORD:-onecli}@postgres:5432/${POSTGRES_DB:-onecli}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:10254}
      AUTH_MODE: ${AUTH_MODE:-local}
    volumes:
      - app-data:/app/data
    env_file:
      - path: ../.env
        required: false
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    networks:
      - onecli

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "10255:10255"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-onecli}:${POSTGRES_PASSWORD:-onecli}@postgres:5432/${POSTGRES_DB:-onecli}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:10254}
      AUTH_MODE: ${AUTH_MODE:-local}
      LOG_FORMAT: ${LOG_FORMAT:-}
    volumes:
      - app-data:/app/data
    env_file:
      - path: ../.env
        required: false
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 256M
    networks:
      - onecli

volumes:
  pgdata:
  app-data:

networks:
  onecli:
    driver: bridge
